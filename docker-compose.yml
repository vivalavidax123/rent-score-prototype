# Run the whole stack locally with no Node/npm/Postgres installed:
#
#   cp .env.docker.example .env.docker   # then fill in the keys
#   docker compose --env-file .env.docker up --build
#
# App: http://localhost:3000  (Postgres data persists in the db-data volume)

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: renting
      POSTGRES_PASSWORD: renting
      POSTGRES_DB: renting
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renting -d renting"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://renting:renting@db:5432/renting
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
      args:
        # Inlined into the client bundle at build time (shows the live map).
        NEXT_PUBLIC_MAPS_API_KEY: ${NEXT_PUBLIC_MAPS_API_KEY:-}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://renting:renting@db:5432/renting
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set it in .env.docker}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:?set it in .env.docker}
      TRANSITLAND_API_KEY: ${TRANSITLAND_API_KEY:-}
      # Optional: leave empty to disable Google sign-in (email/password still works).
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
